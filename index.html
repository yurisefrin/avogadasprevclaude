<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auxílio-doença negado, cortado ou cessado | Advogadas Prev</title>
  <meta name="description" content="Teve o auxílio-doença negado ou cortado? Advogada especialista em Direito Previdenciário. Atendimento online para todo o Brasil." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    :root{
      --ink:#1A1A2E;--mid:#4A4A5A;--light:#8A8A9A;--line:#E8E8EE;
      --bg:#F7F8FA;--white:#FFFFFF;--blue:#1B3A6B;--blue-lt:#E8EFF8;
      --green-wa:#25D366;--max:1080px;
      --fd:"Playfair Display",serif;--fb:"DM Sans",sans-serif;
    }
    body{font-family:var(--fb);background:var(--white);color:var(--ink);line-height:1.6;overflow-x:hidden}
    .wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
    img{max-width:100%;display:block}
    
    /* Header */
    header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .header-inner{display:flex;align-items:center;justify-content:space-between;height:70px}
    .logo img{height:45px}

    /* Hero */
    .hero{padding:60px 0;overflow:hidden}
    .hero-grid{display:grid;grid-template-columns:1fr 420px;gap:60px;align-items:center}
    h1{font-family:var(--fd);font-size:clamp(32px,5vw,48px);line-height:1.1;margin-bottom:20px}
    h1 em{font-style:normal;color:var(--blue)}
    .hero-sub{font-size:18px;color:var(--mid);margin-bottom:30px}
    .btn-wa{display:inline-flex;align-items:center;gap:10px;background:var(--green-wa);color:#fff;padding:16px 32px;border-radius:100px;font-weight:700;text-decoration:none;transition:0.3s}
    .btn-wa:hover{transform:translateY(-3px);box-shadow:0 10px 20px rgba(37,211,102,0.2)}
    .hero-photo img{border-radius:24px;box-shadow:0 30px 60px rgba(0,0,0,0.12)}

    /* Sections */
    section{padding:80px 0;border-top:1px solid var(--line)}
    .section-alt{background:var(--bg)}
    h2{font-family:var(--fd);font-size:32px;margin-bottom:40px;text-align:center}

    /* FAQ */
    .faq-list{max-width:800px;margin:0 auto}
    .faq-item{background:var(--white);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
    .faq-btn{width:100%;padding:20px;text-align:left;background:none;border:none;cursor:pointer;font-family:var(--fd);font-size:18px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
    .faq-answer{padding:0 20px 20px;display:none;color:var(--mid)}
    .faq-item.open .faq-answer{display:block}

    /* Footer */
    footer{padding:40px 0;background:var(--ink);color:var(--white);text-align:center;font-size:14px}

    @media(max-width:850px){
      .hero-grid{grid-template-columns:1fr;text-align:center}
      .hero-photo{order:-1;max-width:320px;margin:0 auto}
      .header-inner{justify-content:center}
      header .btn-wa{display:none}
    }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="header-inner">
      <div class="logo"><img src="logo.webp" alt="Advogadas Prev"></div>
      <a href="#" class="btn-wa" data-wa="header">Falar no WhatsApp</a>
    </div>

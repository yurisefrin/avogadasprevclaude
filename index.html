  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    :root{
      --ink:#1A1A2E;--mid:#4A4A5A;--light:#8A8A9A;--line:#E8E8EE;
      --bg:#F7F8FA;--white:#FFFFFF;--blue:#1B3A6B;--blue-lt:#E8EFF8;
      --green-wa:#25D366;--green:#128C4E;--max:1080px;
      --fd:"Playfair Display",Georgia,serif;--fb:"DM Sans",system-ui,sans-serif;
    }
    body{font-family:var(--fb);background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    .wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .a1{animation:fadeUp .65s .00s ease both}
    .a2{animation:fadeUp .65s .10s ease both}
    .a3{animation:fadeUp .65s .20s ease both}
    .a4{animation:fadeUp .65s .30s ease both}
    .a5{animation:fadeUp .65s .40s ease both}
    .a6{animation:fadeIn  .8s .45s ease both}

    /* Header */
    header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
    .header-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
    .logo img{height:44px;width:auto;display:block;object-fit:contain}

    /* Buttons */
    .btn-wa{display:inline-flex;align-items:center;gap:8px;background:var(--green-wa);color:#fff;font-family:var(--fb);font-size:14px;font-weight:600;padding:10px 20px;border-radius:100px;border:none;cursor:pointer;transition:opacity .2s,transform .15s;white-space:nowrap;line-height:1}
    .btn-wa:hover{opacity:.9;transform:translateY(-1px)}
    .btn-wa:active{transform:translateY(0)}
    .btn-wa-lg{font-size:16px;padding:15px 32px}
    .btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--green);border:1.5px solid var(--green-wa);font-family:var(--fb);font-size:16px;font-weight:600;padding:15px 32px;border-radius:100px;cursor:pointer;transition:background .2s,transform .15s;white-space:nowrap}
    .btn-outline:hover{background:#f0fdf4;transform:translateY(-1px)}
    .wa-icon{width:18px;height:18px;flex-shrink:0}

    /* Mobile sticky */
    .mobile-sticky{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:12px 20px 24px}
    .mobile-sticky a{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--green-wa);color:#fff;font-family:var(--fb);font-size:16px;font-weight:600;padding:15px 20px;border-radius:100px;text-decoration:none}
    .mobile-sticky-sub{text-align:center;font-size:11px;color:var(--light);margin-top:7px;font-weight:500}
    @media(max-width:640px){
      .mobile-sticky{display:block}
      body{padding-bottom:96px}
      header .btn-wa{display:none}
      .header-inner{justify-content:center}
    }

    /* Hero */
    .hero{padding:48px 0 56px;border-bottom:1px solid var(--line);overflow:hidden;position:relative}
    .hero::before{content:"";position:absolute;top:-80px;right:-80px;width:480px;height:480px;background:radial-gradient(circle,rgba(27,58,107,0.06) 0%,transparent 65%);pointer-events:none}
    .hero-grid{display:grid;grid-template-columns:1fr 400px;gap:64px;align-items:center}
    .badge{display:inline-flex;align-items:center;gap:8px;background:var(--blue-lt);color:var(--blue);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 14px;border-radius:100px;margin-bottom:18px}
    .badge-dot{width:6px;height:6px;border-radius:50%;background:var(--green-wa);animation:pulse 2s ease infinite}
    h1{font-family:var(--fd);font-size:clamp(32px,4.2vw,50px);font-weight:700;line-height:1.12;color:var(--ink);letter-spacing:-.02em;margin-bottom:18px}
    h1 em{font-style:normal;color:var(--blue)}
    .hero-sub{font-size:17px;line-height:1.65;color:var(--mid);max-width:480px;margin-bottom:20px}
    .response-badge{display:inline-flex;align-items:center;gap:7px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--green);margin-bottom:24px}
    .response-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--green-wa);animation:pulse 2s ease infinite}
    .hero-ctas{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:28px}
    .trust-list{display:flex;flex-direction:column;gap:9px}
    .trust-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--mid);font-weight:500}
    .trust-item svg{width:17px;height:17px;color:var(--blue);flex-shrink:0}
    .hero-photo-wrap{border-radius:28px;overflow:hidden;aspect-ratio:4/5;background:var(--blue-lt);box-shadow:0 24px 64px rgba(27,58,107,0.15);position:relative}
    .hero-photo-wrap img{width:100%;height:100%;object-fit:cover;object-position:center 8%;display:block}
    .photo-name-badge{position:absolute;bottom:20px;left:16px;right:16px;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
    .pnb-name{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--ink)}
    .pnb-title{font-size:11px;color:var(--light);font-weight:500;margin-top:2px}
    .pnb-online{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--green);white-space:nowrap}
    .pnb-dot{width:7px;height:7px;border-radius:50%;background:var(--green-wa);animation:pulse 2s ease infinite}

    /* Strip */
    .strip{padding:22px 0;border-bottom:1px solid var(--line);background:var(--bg)}
    .strip-inner{display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap}
    .strip-item{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;color:var(--mid)}
    .strip-item svg{width:18px;height:18px;color:var(--blue)}
    .strip-sep{width:1px;height:24px;background:var(--line)}

    /* Sections */
    .section{padding:56px 0;border-bottom:1px solid var(--line)}
    .section-alt{background:var(--bg)}
    .section-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
    h2{font-family:var(--fd);font-size:clamp(24px,3.2vw,36px);font-weight:700;color:var(--ink);line-height:1.18;letter-spacing:-.02em}
    .section-sub{font-size:16px;line-height:1.65;color:var(--mid);margin-top:12px;max-width:520px}

    /* Profile */
    .profile-grid{display:grid;grid-template-columns:260px 1fr;gap:48px;margin-top:40px;align-items:start}
    .profile-card{background:var(--bg);border:1px solid var(--line);border-radius:20px;overflow:hidden;position:sticky;top:84px}
    .profile-photo{width:100%;aspect-ratio:1/1;overflow:hidden;background:var(--blue-lt)}
    .profile-photo img{width:100%;height:100%;object-fit:cover;object-position:center 10%;display:block}
    .profile-info{padding:16px 20px}
    .profile-name{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--ink)}
    .profile-oab{font-size:11px;color:var(--light);margin-top:4px;font-weight:500}
    .profile-bio{font-size:15px;line-height:1.7;color:var(--mid);margin-bottom:20px}
    .response-block{display:flex;align-items:flex-start;gap:14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:14px;padding:16px 18px;margin-bottom:24px}
    .response-block svg{width:20px;height:20px;color:var(--green);flex-shrink:0;margin-top:1px}
    .response-block strong{display:block;font-size:14px;font-weight:600;color:#166534;margin-bottom:3px}
    .response-block p{font-size:13px;color:#15803D;line-height:1.5}
    .commitments{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
    .ci{display:flex;align-items:flex-start;gap:14px;padding:16px;background:var(--bg);border:1px solid var(--line);border-radius:14px}
    .ci-num{width:30px;height:30px;border-radius:8px;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;color:var(--blue);font-family:var(--fd)}
    .ci strong{display:block;font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px}
    .ci p{font-size:13px;color:var(--mid);line-height:1.55}

    /* Steps */
    .steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:40px;background:var(--line);border-radius:22px;overflow:hidden}
    .step{background:var(--white);padding:28px 24px}
    .step:first-child{border-radius:22px 0 0 22px}
    .step:last-child{border-radius:0 22px 22px 0}
    .step-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
    .step-num{font-family:var(--fd);font-size:32px;font-weight:700;color:var(--line);line-height:1;flex-shrink:0}
    .step-icon{width:40px;height:40px;border-radius:10px;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .step-icon svg{width:20px;height:20px;color:var(--blue)}
    .step h3{font-family:var(--fd);font-size:17px;font-weight:600;color:var(--ink);margin-bottom:8px}
    .step p{font-size:14px;line-height:1.65;color:var(--mid)}

    /* Info grid */
    .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;margin-top:40px;background:var(--line);border-radius:22px;overflow:hidden}
    .info-item{background:var(--white);padding:28px}
    .info-item:nth-child(1){border-radius:22px 0 0 0}
    .info-item:nth-child(2){border-radius:0 22px 0 0}
    .info-item:nth-child(3){border-radius:0 0 0 22px}
    .info-item:nth-child(4){border-radius:0 0 22px 0}
    .info-icon{width:40px;height:40px;border-radius:10px;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
    .info-icon svg{width:20px;height:20px;color:var(--blue)}
    .info-item h3{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--ink);margin-bottom:7px}
    .info-item p{font-size:14px;line-height:1.65;color:var(--mid)}

    /* Deadline */
    .deadline{background:#FFF8F0;border:1px solid #F5D9A8;border-radius:16px;padding:20px 24px;display:flex;align-items:flex-start;gap:16px;margin-top:40px}
    .deadline-icon{width:36px;height:36px;border-radius:10px;background:#FEF0D5;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .deadline-icon svg{width:18px;height:18px;color:#B45309}
    .deadline-text strong{display:block;font-size:14px;font-weight:700;color:#92400E;margin-bottom:4px}
    .deadline-text p{font-size:13px;line-height:1.6;color:#78350F}

    /* FAQ */
    .faq-list{margin-top:40px;display:flex;flex-direction:column;gap:2px;background:var(--line);border-radius:22px;overflow:hidden}
    .faq-item{background:var(--white)}
    .faq-item:first-child{border-radius:22px 22px 0 0}
    .faq-item:last-child{border-radius:0 0 22px 22px}
    .faq-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px 28px;background:none;border:none;cursor:pointer;text-align:left;transition:background .15s}
    .faq-btn:hover{background:var(--bg)}
    .faq-question{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--ink);line-height:1.3}
    .faq-chevron{width:20px;height:20px;color:var(--blue);flex-shrink:0;transition:transform .25s}
    .faq-item.open .faq-chevron{transform:rotate(180deg)}
    .faq-answer{display:none;padding:0 28px 22px;font-size:14px;line-height:1.75;color:var(--mid)}
    .faq-item.open .faq-answer{display:block}

    /* Final CTA */
    .final-cta{padding:72px 0;text-align:center;background:var(--ink);position:relative;overflow:hidden}
    .final-cta::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(27,58,107,0.9) 0%,transparent 60%);pointer-events:none}
    .final-cta .section-label{color:rgba(255,255,255,0.45)}
    .final-cta h2{color:#fff;max-width:560px;margin:0 auto 12px}
    .final-cta .section-sub{color:rgba(255,255,255,0.6);margin:0 auto 14px}
    .cta-response{display:inline-flex;align-items:center;gap:7px;background:rgba(37,211,102,0.15);border:1px solid rgba(37,211,102,0.3);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;color:#86EFAC;margin-bottom:28px}
    .cta-response-dot{width:6px;height:6px;border-radius:50%;background:var(--green-wa);animation:pulse 2s ease infinite}
    .final-cta-row{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
    .legal-note{margin-top:24px;font-size:12px;color:rgba(255,255,255,0.3);line-height:1.6;max-width:480px;margin-left:auto;margin-right:auto}

    /* Footer */
    footer{border-top:1px solid var(--line);padding:28px 0;background:var(--white)}
    .footer-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
    .footer-left{font-size:13px;color:var(--light);line-height:1.7}
    .footer-left strong{color:var(--mid)}
    .footer-right{display:flex;align-items:center;gap:22px}
    .footer-link{font-size:12px;color:var(--light);transition:color .2s}
    .footer-link:hover{color:var(--mid)}

    /* Responsive */
    @media(max-width:860px){
      .hero-grid{grid-template-columns:1fr;gap:40px}
      .hero-photo-wrap{max-width:360px;margin:0 auto}
      .profile-grid{grid-template-columns:1fr}
      .profile-card{position:static;max-width:260px}
      .steps-grid{grid-template-columns:1fr}
      .step{border-radius:0!important}
      .step:first-child{border-radius:22px 22px 0 0!important}
      .step:last-child{border-radius:0 0 22px 22px!important}
      .info-grid{grid-template-columns:1fr}
      .info-item{border-radius:0!important}
      .info-item:first-child{border-radius:22px 22px 0 0!important}
      .info-item:last-child{border-radius:0 0 22px 22px!important}
      .strip-sep{display:none}
    }
    @media(max-width:580px){
      .hero{padding:36px 0 44px}
      .section{padding:44px 0}
      .hero-ctas{flex-direction:column;align-items:stretch}
      .btn-wa-lg,.btn-outline{width:100%;justify-content:center}
      .final-cta{padding:56px 0}
      .faq-btn{padding:18px 20px}
      .faq-answer{padding:0 20px 18px}
    }
  </style>

  <script>
    const WHATSAPP_NUMBER = "SEU_NUMERO_WHATSAPP";
    function trackAndOpen(msg,ctx){
      try{if(window.fbq){fbq("track","Lead");fbq("track","Contact")}}catch(e){}
      try{if(window.gtag){gtag("event","generate_lead",{method:"whatsapp",context:ctx});gtag("event","whatsapp_click",{context:ctx})}}catch(e){}
      window.open("https://wa.me/"+WHATSAPP_NUMBER+"?text="+encodeURIComponent(msg),"_blank","noopener,noreferrer");
    }
    document.addEventListener("DOMContentLoaded",()=>{
      document.querySelectorAll("[data-wa]").forEach(el=>{
        el.addEventListener("click",ev=>{
          ev.preventDefault();
          trackAndOpen(el.dataset.waMsg||"Olá! Gostaria de orientação.",el.dataset.wa);
        });
      });
      document.querySelectorAll(".faq-btn").forEach(btn=>{
        btn.addEventListener("click",()=>{
          const item=btn.closest(".faq-item");
          const isOpen=item.classList.contains("open");
          document.querySelectorAll(".faq-item.open").forEach(i=>i.classList.remove("open"));
          if(!isOpen)item.classList.add("open");
        });
      });
    });
  <\/script>

<section class="section section-alt">

    <h2>Dúvidas mais comuns<br>sobre o auxílio-doença</h2>
    <div class="faq-list">
      <div class="faq-item">
        <button class="faq-btn"><span class="faq-question">O que fazer quando o INSS nega o auxílio-doença?</span><svg class="faq-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
        <div class="faq-answer">Após a negativa, você tem 30 dias para interpor recurso administrativo ao Conselho de Recursos da Previdência Social (CRPS). Caso o prazo já tenha passado ou o recurso seja indeferido, ainda é possível questionar a decisão pela via judicial. Em ambos os casos, é fundamental analisar a documentação médica e o histórico contributivo antes de escolher o melhor caminho.</div>
      </div>
      <div class="faq-item">
        <button class="faq-btn"><span class="faq-question">Qual o prazo para recorrer após a perícia do INSS?</span><svg class="faq-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
        <div class="faq-answer">O prazo para recurso administrativo é de 30 dias a partir da data em que você tomou ciência da decisão. Esse recurso é dirigido ao CRPS e não exige o pagamento de custas. Após esse prazo, a via administrativa pode não estar mais disponível, restando a ação judicial.</div>
      </div>
      <div class="faq-item">
        <button class="faq-btn"><span class="faq-question">Posso entrar na Justiça diretamente sem recurso no INSS?</span><svg class="faq-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
        <div class="faq-answer">Sim. Não é obrigatório esgotar a via administrativa antes de acionar o Judiciário. A ação judicial pode ser ajuizada diretamente, especialmente quando há urgência. A decisão sobre qual caminho seguir depende da análise individual de cada caso.</div>
      </div>
      <div class="faq-item">
        <button class="faq-btn"><span class="faq-question">O INSS pode cortar o benefício sem aviso prévio?</span><svg class="faq-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
        <div class="faq-answer">O INSS pode convocar o segurado para reavaliação médica periódica. Se o perito concluir pela ausência de incapacidade, o benefício pode ser cessado. O segurado deve receber comunicação sobre a decisão e tem direito a contestá-la administrativa ou judicialmente.</div>
      </div>
      <div class="faq-item">
        <button class="faq-btn"><span class="faq-question">Preciso de advogado para recorrer ao INSS?</span><svg class="faq-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
        <div class="faq-answer">O recurso administrativo pode ser feito sem advogado. No entanto, a orientação jurídica antes de protocolar o recurso aumenta significativamente a qualidade da peça, pois permite identificar inconsistências na decisão do INSS e orientar a complementação da documentação médica.</div>
      </div>
